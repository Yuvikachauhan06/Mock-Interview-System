<!DOCTYPE html>
<html>
<head>
  <title>Answer Questions - Mock Interview</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
  <h2>Answer the Questions</h2>
  <div class="subtitle">Please provide detailed answers for each question</div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <form action="/evaluate" method="post">
    {% for q in questions %}
    <div class="question-item">
      <div class="question-number">Question {{ loop.index }}</div>
      <div class="domain-tag">{{ q['domain'] }}</div>
      <div class="question-text">{{ q['question'] }}</div>
      
      <label>Your Answer:</label>
      <textarea name="answer{{ loop.index }}" rows="5" required placeholder="Type your answer here..."></textarea>
      <small class="char-count">0 characters</small>
      <input type="hidden" name="domain{{ loop.index }}" value="{{ q['domain'] }}">
      <input type="hidden" name="ideal{{ loop.index }}" value="{{ q['ideal_answer'] }}">
      <input type="hidden" name="keywords{{ loop.index }}" value="{{ q['keywords'] }}">
    </div>
    {% endfor %}
    
    <button type="submit">Submit Answers</button>
  </form>
</div>

<script>
const total = {{ questions|length }} || 1;
const textareas = document.querySelectorAll('textarea');

function updateProgress() {
  let answered = 0;

  textareas.forEach(ta => {
    if (ta.value.trim().length > 0) answered++;

    // FIX: find closest counter properly
    const counter = ta.parentElement.querySelector('.char-count');
    if (counter) {
      counter.innerText = ta.value.length + " characters";
    }
  });

  const percent = (answered / total) * 100;
  document.getElementById('progressBar').style.width = percent + '%';
}

textareas.forEach(ta => {
  ta.addEventListener('input', updateProgress);
});

updateProgress();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Interview Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Welcome, {{ username }}! </h2>
        <div class="subtitle">Ready to ace your interview? Let's get started!</div>
        
        <a href="/upload" class="btn"> Take Test</a>
        <a href="/progress" class="btn"> View Progress</a>
        <a href="/logout" class="btn" style="background:#f44336;"> Logout</a>
        
        <div style="margin-top: 30px; padding: 20px; background: #fafafa; border-radius: 8px; text-align: center;">
            <div style="display: flex; justify-content: space-around; flex-wrap: wrap;">
                <div style="text-align: center;">
                    <div style="font-size: 24px; font-weight: bold; color: #4CAF50;">10+</div>
                    <div style="color: #666;">Practice Tests</div>
                </div>
                <div style="text-align: center;">
                    <div style="font-size: 24px; font-weight: bold; color: #4CAF50;">Multiple</div>
                    <div style="color: #666;">Domains</div>
                </div>
                <div style="text-align: center;">
                    <div style="font-size: 24px; font-weight: bold; color: #4CAF50;">AI-Powered</div>
                    <div style="color: #666;">Evaluation</div>
                </div>
            </div>
        </div>
        
        <div class="center" style="margin-top: 20px; color: #666;">
            <p> Tip: Practice regularly to improve your interview skills!</p>
        </div>
    </div>
</body>
</html>
